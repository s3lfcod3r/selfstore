name: Katalog Auto-Sync

on:
  workflow_dispatch: {}
  # Von einem App-Repo per repository_dispatch (Event "app-released") auslösbar —
  # dafür braucht das App-Repo ein PAT-Secret mit actions:write auf dieses Repo.
  repository_dispatch:
    types: [app-released]
  schedule:
    - cron: "*/15 * * * *"   # alle 15 Minuten (Sync lädt nur bei echter Änderung)

permissions:
  contents: write

concurrency:
  group: sync-catalog
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten
        run: pip install --quiet pyaxmlparser

      - name: Katalog synchronisieren
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_DATE: ${{ github.run_id }}
        run: |
          export SYNC_DATE="$(date -u +%F)"
          python tools/sync_catalog.py

      - name: Änderungen committen
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "selfstore-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: Katalog Auto-Sync (Release-Versionen + Bootstrap-APK)"
            git push
          else
            echo "Keine Änderungen am Katalog."
          fi
